services:
  relay:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://nostr:nostr@db:5432/nostr
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: nostr
      POSTGRES_PASSWORD: nostr
      POSTGRES_DB: nostr
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nostr"]
      interval: 2s
      timeout: 3s
      retries: 15
    restart: unless-stopped

volumes:
  pgdata:
